<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de Tarefas — AV1 (versão iniciante)</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Lista de Tarefas</h1>

      <!-- Formulário para adicionar nova tarefa -->
      <form id="task-form">
        <input id="task-input" type="text" placeholder="Digite uma nova tarefa" />
        <button type="submit">Adicionar</button>
      </form>

      <!-- Mensagem de erro (mostrada no DOM) -->
      <p id="error-message" class="error"></p>

      <section>
        <h2>Minhas tarefas</h2>
        <ul id="task-list"></ul>
      </section>

      <footer class="footer">Entrega: 27/02 — AV1 (Create + Read)</footer>
    </main>

    <script src="js/script.js" defer></script>
  </body>
</html>
